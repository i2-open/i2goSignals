name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build / vet / test (Go 1.26.2)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ ping: 1 })' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGO_URL: mongodb://localhost:27017
      GOTOOLCHAIN: local

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: false
          cache: true

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go vet
        # pkg/ssfModels (swagger-generated), pkg/goScim, and cmd/cluster-monitor
        # have pre-existing warnings called out in CLAUDE.md. Vetting everything
        # else gates against new warnings without blocking on the legacy noise.
        run: |
          go list ./... \
            | grep -vE '^github.com/i2-open/i2goSignals/(pkg/ssfModels|pkg/goScim|cmd/cluster-monitor)(/|$)' \
            | xargs go vet

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race -count=1 -timeout 900s ./...

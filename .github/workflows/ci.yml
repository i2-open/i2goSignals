name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build / vet / test (Go 1.26.4)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ ping: 1 })' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGO_URL: mongodb://localhost:27017
      GOTOOLCHAIN: local

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          check-latest: false
          cache: true

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: pkg boundary gate (PRD #175 cleaned packages)
        # The lifted packages (pkg/services, pkg/dao incl. ids+memory,
        # pkg/authSupport) must never import internal/*. Scoped on purpose:
        # other pkg/* still carry pre-existing pkg->internal violations that
        # are out of scope here, so a blanket gate would be a false failure.
        run: |
          if grep -rn 'github.com/i2-open/i2goSignals/internal/' \
               --include='*.go' \
               pkg/services pkg/dao pkg/authSupport; then
            echo "ERROR: pkg->internal import found in a PRD #175 cleaned package" >&2
            exit 1
          fi
          echo "OK: no pkg->internal imports in pkg/services, pkg/dao, pkg/authSupport"

      - name: go vet
        # pkg/ssfModels (swagger-generated), pkg/goScim, and cmd/cluster-monitor
        # have pre-existing warnings called out in CLAUDE.md. Vetting everything
        # else gates against new warnings without blocking on the legacy noise.
        run: |
          go list ./... \
            | grep -vE '^github.com/i2-open/i2goSignals/(pkg/ssfModels|pkg/goScim|cmd/cluster-monitor)(/|$)' \
            | xargs go vet

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race -count=1 -timeout 900s ./...

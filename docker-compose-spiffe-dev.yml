name: i2gosignals-spiffe

# SPIFFE/SPIRE-enabled development environment.
# Extends docker-compose-dev.yml by adding a SPIRE server and agent that
# issue X.509-SVIDs to each goSignals node. Inter-cluster communication and
# MongoDB connections use SPIFFE mTLS when SPIFFE_ENDPOINT_SOCKET is set.
#
# Usage:
#   docker-compose -f docker-compose-spiffe-dev.yml up
#
# After startup, register workloads with SPIRE:
#   docker exec spire-server sh /etc/spire/registration/register.sh

volumes:
  prometheus_data: {}
  postgres_data:
    driver: local
  go_mod_cache: {}
  go_build_cache: {}
  spire_data: {}
  # Shared Unix socket between SPIRE agent and workload containers
  spire_sockets:

services:
  # ---------------------------------------------------------------------------
  # MongoDB replica set (same as docker-compose-dev.yml)
  # ---------------------------------------------------------------------------
  mongo1:
    container_name: mongo1
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    networks:
      - backend
    ports:
      - "30001:30001"
    command: ["--replSet","dbrs","--keyFile","/data/replica.key","--bind_ip_all","--port","30001"]
    volumes:
      - ".mongo/replica.key:/data/replica.key"
      - ".mongo/mongo1:/data/db"

  mongo2:
    container_name: mongo2
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    networks:
      - backend
    ports:
      - "30002:30002"
    command: ["--replSet","dbrs","--keyFile","/data/replica.key","--bind_ip_all","--port","30002"]
    volumes:
      - ".mongo/replica.key:/data/replica.key"
      - ".mongo/mongo2:/data/db"

  mongo3:
    container_name: mongo3
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    ports:
      - "30003:30003"
    networks:
      - backend
    command: ["--replSet","dbrs","--keyFile","/data/replica.key","--bind_ip_all","--port","30003"]
    volumes:
      - ".mongo/replica.key:/data/replica.key"
      - ".mongo/mongo3:/data/db"

  mongoSetup:
    image: mongo:latest
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    volumes:
      - ".mongo/:/scripts"
    restart: "no"
    networks:
      - backend
    entrypoint: ["bash", "/scripts/mongo_init.sh"]

  # ---------------------------------------------------------------------------
  # SPIRE Server — issues SVIDs for the cluster trust domain
  # ---------------------------------------------------------------------------
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.6
    container_name: spire-server
    hostname: spire-server
    networks:
      - backend
    ports:
      - "8081:8081"   # SPIRE gRPC API (agents connect here)
      - "8443:8443"   # Federation bundle endpoint (cross-domain)
    volumes:
      - ./config/spire/server:/etc/spire/server
      - ./config/spire/registration:/etc/spire/registration
      - spire_data:/var/lib/spire/server
    command: ["-config", "/etc/spire/server/server.conf"]
    healthcheck:
      test: ["/opt/spire/bin/spire-server", "healthcheck", "-registrationUDSPath", "/tmp/spire-registration.sock"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # SPIRE Agent — proxies workload API requests to the SPIRE server
  # ---------------------------------------------------------------------------
  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.9.6
    container_name: spire-agent
    hostname: spire-agent
    networks:
      - backend
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - ./config/spire/agent:/etc/spire/agent
      - spire_sockets:/run/spire/sockets   # shared with workload containers
      - /var/run/docker.sock:/var/run/docker.sock  # Docker attestation
    command: ["-config", "/etc/spire/agent/agent.conf"]
    pid: "host"  # required for PID-based workload attestation

  # ---------------------------------------------------------------------------
  # Monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - backend
    volumes:
      - "./config/monitor/prometheus:/etc/prometheus"
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    networks:
      - frontend
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - "./config/monitor/grafana:/etc/grafana/provisioning/datasources"

  # ---------------------------------------------------------------------------
  # goSignals nodes — SPIFFE-enabled
  # ---------------------------------------------------------------------------
  goSignals1:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    container_name: gosignals1
    hostname: goSignals1
    networks:
      - frontend
      - backend
    depends_on:
      mongo1:
        condition: service_started
      mongoSetup:
        condition: service_completed_successfully
      spire-agent:
        condition: service_started
    ports:
      - "8888:8888"
      - "2345:2345"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - spire_sockets:/run/spire/sockets  # SPIRE agent socket
    env_file:
      - ./config/goSignals1.env
    environment:
      # SPIFFE configuration — enables mTLS for inter-cluster calls and MongoDB
      - SPIFFE_ENDPOINT_SOCKET=unix:///run/spire/sockets/agent.sock
      - SPIFFE_TRUST_DOMAIN=cluster.i2gosignals.internal
      - SPIFFE_MONGO_ENABLED=true
    labels:
      com.i2gosignals.role: gosignals-node

  goSignals2:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    container_name: gosignals2
    hostname: goSignals2
    networks:
      - frontend
      - backend
    depends_on:
      mongo1:
        condition: service_started
      mongoSetup:
        condition: service_completed_successfully
      spire-agent:
        condition: service_started
    ports:
      - "8889:8889"
      - "2346:2345"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - spire_sockets:/run/spire/sockets
    env_file:
      - ./config/goSignals2.env
    environment:
      - SPIFFE_ENDPOINT_SOCKET=unix:///run/spire/sockets/agent.sock
      - SPIFFE_TRUST_DOMAIN=cluster.i2gosignals.internal
      - SPIFFE_MONGO_ENABLED=true
    labels:
      com.i2gosignals.role: gosignals-node

  goSsfServer:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    container_name: gossfserver
    hostname: goSsfServer
    networks:
      - frontend
      - backend
    depends_on:
      spire-agent:
        condition: service_started
    ports:
      - "8890:8890"
      - "2347:2345"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - spire_sockets:/run/spire/sockets
    env_file:
      - ./config/goSsf1.env
    environment:
      - SPIFFE_ENDPOINT_SOCKET=unix:///run/spire/sockets/agent.sock
      - SPIFFE_TRUST_DOMAIN=cluster.i2gosignals.internal
      - SPIFFE_MONGO_ENABLED=true
    labels:
      com.i2gosignals.role: gossf-node
    command: ["dlv", "debug", "./cmd/goSsfServer", "--headless=true", "--listen=:2345", "--api-version=2", "--accept-multiclient", "--continue"]

  # ---------------------------------------------------------------------------
  # Keycloak (OAuth2 AS) — same as docker-compose-dev.yml
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak-signals
    hostname: keycloak
    networks:
      - frontend
      - backend
    command: start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_URL: https://keycloak:9080
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/server-cert.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/server-key.pem
      KC_HTTPS_PORT: 9080
      KC_FEATURES: scripts
      KC_SCRIPT_UPLOAD_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      QUARKUS_HTTP_HOST: 0.0.0.0
    ports:
      - 9080:9080
    depends_on:
      - postgres
    volumes:
      - "./config/keycloak/realm:/opt/keycloak/data/import"
      - "./config/keycloak/themes/gosignals-mui:/opt/keycloak/themes/gosignals-mui"
      - "./config/certs:/opt/keycloak/certs"

networks:
  frontend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
  backend:
    driver: bridge

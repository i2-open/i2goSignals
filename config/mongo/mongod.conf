security:
  # Keep keyFile as the outgoing cluster credential.
  # sendKeyFile: members SEND the keyFile to peers (no chicken-and-egg problem
  # during rs.initiate()) but ACCEPT both keyFile and x.509 on incoming
  # connections.  This satisfies the MongoDB requirement that clusterAuthMode
  # "allows X.509" before clusterAuthX509.attributes can be set.
  keyFile: "/data/config/replica.key"
  clusterAuthMode: sendKeyFile

net:
  tls:
    # Narrow the cluster-member certificate pattern to the unique
    # x500UniqueIdentifier value carried ONLY by the workload/mongodb SVID.
    #
    # Background:
    #   All SPIRE SVIDs share "O=SPIRE,C=US".  Without this setting MongoDB
    #   derives cluster-member criteria from the server cert's O/OU, so every
    #   SPIFFE cert looks like a cluster member, and $external user creation
    #   fails with "subjectname that would be recognized as an internal cluster
    #   member".
    #
    # How this fixes it:
    #   The uniqueid CredentialComposer plugin sets OID 2.5.4.45
    #   (x500UniqueIdentifier) to SHA256(spiffe_id)[0:16] hex — deterministic
    #   and unique per SPIFFE ID.  For workload/mongodb the value is always:
    #     6ff4e8d38b5f843e7b91b001b8820e7f
    #   (= SHA256("spiffe://cluster.i2gosignals.internal/workload/mongodb")[0:32])
    #
    #   Setting attributes to that specific value means:
    #     • MongoDB's own cert (the workload/mongodb SVID) contains it → server
    #       starts without error.
    #     • Incoming x.509 connections from other replica members (same SPIFFE ID)
    #       are recognised as cluster members.
    #     • Workload certs (gosignals-node, gossf-node, scim) carry a DIFFERENT
    #       x500UniqueIdentifier hash → NOT recognised as cluster members →
    #       $external user creation succeeds.
    #
    # If the trust domain or workload path ever changes, recompute:
    #   printf '%s' "spiffe://<domain>/workload/mongodb" | \
    #     openssl dgst -sha256 | awk '{print $NF}' | cut -c1-32
    clusterAuthX509:
      attributes: "x500UniqueIdentifier=6ff4e8d38b5f843e7b91b001b8820e7f"

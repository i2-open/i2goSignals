server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "cluster.i2gosignals.internal"
    data_dir = "/var/lib/spire/server"
    log_level = "INFO"
    # How long issued SVIDs are valid. Short lifetimes improve security;
    # go-spiffe rotates them automatically before expiry.
    # MongoDB SVIDs also use this 1h default. The mongo_spiffe_init.sh renewal
    # loop calls db.adminCommand({rotateCertificates:1}) on each mongod after
    # writing new cert files, enabling hot reload without a process restart.
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl = "5m"

    # Federation bundle endpoint — enables cross-domain trust for federated
    # SSF stream management. Operators add 'federates_with' blocks below to
    # establish trust with partner deployments.
    #
    # federation {
    #   bundle_endpoint {
    #     address = "0.0.0.0"
    #     port    = 8443
    #     profile "https_spiffe" {
    #       endpoint_spiffe_id = "spiffe://cluster.i2gosignals.internal/spire/server"
    #     }
    #   }
    #
    #   # Example: trust a partner SSF deployment
    #   federates_with "partner.example.com" {
    #     bundle_endpoint_url = "https://spire.partner.example.com:8443"
    #     bundle_endpoint_profile "https_spiffe" {
    #       endpoint_spiffe_id = "spiffe://partner.example.com/spire/server"
    #     }
    #   }
    # }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/var/lib/spire/server/datastore.sqlite3"
        }
    }

    # NodeAttestor "join_token" is used for automated bootstrapping in the
    # development environment.
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/var/lib/spire/server/keys.json"
        }
    }

    # Adds a deterministic x509UniqueIdentifier attribute (OID 2.5.4.45) to the
    # Subject of every workload X509-SVID. The value is SHA256(spiffe_id)[0:16]
    # hex-encoded — making the Subject non-empty and stable across rotations.
    # Required for MongoDB X.509 authentication, which maps the TLS peer
    # certificate's Subject DN to a user in the $external database.
    CredentialComposer "uniqueid" {}

}

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      scheme: http
      timeout: 10s
      api_version: v2
scrape_configs:
  - job_name: prometheus
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/ca-cert.pem
    static_configs:
      - targets:
          - localhost:9090
  - job_name: i2gosignals
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/ca-cert.pem
    static_configs:
      - targets:
          - gosignals1:8888
          - gosignals2:8889
  - job_name: i2scim
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /q/metrics
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/ca-cert.pem
      # The SCIM peers run on a JDK that rejects a TLS SNI whose host_name
      # contains an underscore (RFC 1123). The container names scim_cluster1 /
      # scim_cluster2 do, so Prometheus must send a valid SNI: `localhost` is
      # in the shared dev certificate's SANs and the JDK accepts it.
      server_name: localhost
    static_configs:
      - targets:
          - scim_cluster1:8443
          - scim_cluster2:8443

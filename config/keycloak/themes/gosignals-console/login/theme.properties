# Name of the themes directory is the themes ID: gosignals-console
# Keep overrides minimal; rely on Keycloak default templates.

parent=keycloak.v2
types=login

# Register our stylesheet (resolved from resources/css)
styles=css/theme.css

# Optional metadata
locales=en
displayName=GoSignals Console
description=Login theme styled to match the GoSignals admin phosphor-CRT "console" skin (PRD #67)

# PatternFly v5 dark mode class (the console skin is dark-canonical, but we
# keep the class wired so PF v5 picks up the dark token set automatically
# when the OS reports prefers-color-scheme: dark; light-mode overrides in
# theme.css produce the warm-paper console-day look.)
kcDarkModeClass=pf-v5-theme-dark

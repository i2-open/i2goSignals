name: i2gosignals-cluster-dev

volumes:
  prometheus_data: {}
  postgres_data:
    driver: local
  go_mod_cache: {}
  go_build_cache: {}

services:
  nginx:
    image: nginx:latest
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/certs:/etc/nginx/certs:ro
    ports:
      - "8888:8888"
      - "9000:9000"
      - "9080:9080"
    depends_on:
      - goSignals1
      - goSignals1b
      - goSignals2
      - goSsfServer
      - keycloak
      - scim_cluster1
      - scim_cluster2

  mongo1:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    ports:
      - "30001:30001"
    command: ["--replSet","dbrs","--keyFile","/data/replica.key","--bind_ip_all","--port","30001"]
    volumes:
      - ".mongo/replica.key:/data/replica.key"
      - ".mongo/mongo1:/data/db"
  mongo2:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    ports:
      - "30002:30002"
    command: [ "--replSet","dbrs","--keyFile","/data/replica.key","--bind_ip_all","--port","30002" ]
    volumes:
      - ".mongo/replica.key:/data/replica.key"
      - ".mongo/mongo2:/data/db"
  mongo3:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    ports:
      - "30003:30003"
    command: [ "--replSet","dbrs","--keyFile","/data/replica.key","--bind_ip_all","--port","30003" ]
    volumes:
      - ".mongo/replica.key:/data/replica.key"
      - ".mongo/mongo3:/data/db"
  mongoSetup:
    image: mongo:latest
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    volumes:
      - ".mongo/:/scripts"
    restart: "no"
    entrypoint: [ "bash", "/scripts/mongo_init.sh"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - "./config/monitor/prometheus:/etc/prometheus"
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - "./config/monitor/grafana:/etc/grafana/provisioning/datasources"

  goSignals1:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    hostname: goSignals1
    depends_on:
      mongo1:
        condition: service_started
      mongoSetup:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - ./config/goSignals1.env
    environment:
      - NODE_ID=goSignals1
      - BASE_URL=https://gosignals1:8888/
      - I2SIG_ISSUER=https://gosignals1:8888
      - I2SIG_CLUSTER_INTERNAL_TOKEN=cluster-secret-123
      - I2SIG_MONGO_WATCH_ENABLED=false
      - I2SIG_TRANSMITTER_BACKFILL_INTERVAL=1s

  goSignals1b:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    hostname: goSignals1b
    depends_on:
      mongo1:
        condition: service_started
      mongoSetup:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - ./config/goSignals1.env
    environment:
      - NODE_ID=goSignals1b
      - BASE_URL=https://gosignals1:8888/
      - I2SIG_ISSUER=https://gosignals1:8888
      - I2SIG_CLUSTER_INTERNAL_TOKEN=cluster-secret-123
      - I2SIG_MONGO_WATCH_ENABLED=false
      - I2SIG_TRANSMITTER_BACKFILL_INTERVAL=1s

  goSignals2:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    hostname: goSignals2
    depends_on:
      mongo1:
        condition: service_started
      mongoSetup:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - ./config/goSignals2.env
    environment:
      - NODE_ID=goSignals2
      - BASE_URL=https://gosignals2:8888/
      - I2SIG_ISSUER=https://gosignals2:8888
      - I2SIG_CLUSTER_INTERNAL_TOKEN=cluster-secret-123
      - I2SIG_MONGO_WATCH_ENABLED=false
      - I2SIG_TRANSMITTER_BACKFILL_INTERVAL=1s

  goSsfServer:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    hostname: goSsfServer
    depends_on:
      mongo1:
        condition: service_started
      mongoSetup:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - ./config/goSsf1.env
    environment:
      - NODE_ID=goSsfServer
      - BASE_URL=https://gossfserver:8888/
      - I2SIG_ISSUER=https://gossfserver:8888
      - I2SIG_CLUSTER_INTERNAL_TOKEN=cluster-secret-123
      - I2SIG_MONGO_WATCH_ENABLED=false
      - I2SIG_TRANSMITTER_BACKFILL_INTERVAL=1s
    command: ["dlv", "debug", "./cmd/goSsfServer", "--headless=true", "--listen=:2345", "--api-version=2", "--accept-multiclient", "--continue"]

  scimSsfSetup:
    image: i2gosignals:v0.8
    depends_on:
      - mongo1
      - mongo2
      - mongo3
      - goSignals1
      - goSignals2
    volumes:
      - "./config/scim:/scim"
    restart: "no"
    environment:
      - ISSUER=cluster.scim.example.com
      - GOSIGNALS_HOME=/scim/config.json
    entrypoint: [ "sh", "/scim/scripts/register.sh"]

  scim_cluster1:
    image: independentid/i2scim-universal:0.8.0
    depends_on:
      goSignals1:
        condition: service_started
      scimSsfSetup:
        condition: service_completed_successfully
    volumes:
      - ./config/scim/data1:/scim
    env_file:
      - ./config/scim/scim_cluster.env
  scim_cluster2:
    image: independentid/i2scim-universal:0.8.0
    depends_on:
      goSignals1:
        condition: service_started
      scimSsfSetup:
        condition: service_completed_successfully
    volumes:
      - ./config/scim/data2:/scim
    env_file:
      - ./config/scim/scim_cluster.env
  postgres:
    image: postgres:alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    hostname: keycloak
    command: start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_URL: https://keycloak:9080
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/server-cert.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/server-key.pem
      KC_HTTPS_PORT: 9080
      KC_FEATURES: scripts
      KC_SCRIPT_UPLOAD_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      QUARKUS_HTTP_HOST: 0.0.0.0
    depends_on:
      - postgres
    volumes:
      - "./config/keycloak/realm:/opt/keycloak/data/import"
      - "./config/keycloak/themes/gosignals-mui:/opt/keycloak/themes/gosignals-mui"
      - "./config/certs:/opt/keycloak/certs"

name: i2gosignals
# Demonstration docker-compose file for i2gosignals
#
# This file is comparable to docker-compose.yml except that it is meant for development and debugging.
#
# This file set up a demonstration set of services including GoSignals, an SsfServer, as well as 2 SCIM servers used
# to demonstrate SCIM Event generation and consumption via GoSignals. Also provided are auxilary services such as:
# Keycloak, Prometheus, Grafana, and various backend services. It also includes
# network definitions for frontend and backend services.
#
# Networks:
# - frontend: Services accessible from the host machine
# - backend: Services internal to the application, not directly accessible from the host
#
# Volumes:
# - prometheus_data: Persistent storage for Prometheus metrics
# - postgres_data: Persistent storage for PostgreSQL database
# - mongo1_data: Persistent storage for MongoDB replica set 1
# - mongo2_data: Persistent storage for MongoDB replica set 2
# - mongo3_data: Persistent storage for MongoDB replica set 3
# - mongo_config: Persistent storage for MongoDB configuration files
#
# Mongo Cluster:
#   - Three-node replica set for high availability and data redundancy
#   - Configured with shared storage for data persistence
#   - Uses Docker volumes for persistent storage
#
# GoSignals Nodes:
# Each node (goSignals1, goSignals2, and goSsfServer) stores their data in the Mongo Cluster
# using a separate DBNAME. This allows each server to run as an isolated server instance so that
# streams can be set up between servers for testing and demonstration purposes
#
# Keycloak OAuth Services:
# Keycloak is used to demonstrate OAuth and OIDC support in goSignals servers.
# Keycloak is configured with a PostgreSQL database for user storage and management.
#
# SCIM Cluster:
# scim_cluster1 and scim_cluster2 are configured each with private memory storage
# using Docker volumes for persistent storage. They are used to demonstrate SCIM (System for Cross-domain Identity Management)
# integration with goSignals servers.  The demo shows a SCIM Directory cluster starting and auto-registering
# with goSignals1.  Each node registers 2 streams with goSignals1 with a shared common audience. When one node receives
# SCIM protocol request, a SCIM Event is generated and sent to goSignals1 for processing. The other node, receives the event
# and processes the event as well demonstrating co-ordinated provisioning between nodes - an effective cluster.

volumes:
  prometheus_data: {}
  postgres_data:
    driver: local
  mongo1_data: {}
  mongo2_data: {}
  mongo3_data: {}
  mongo_config: {}
  loki_data: {}
  # Caches for Go modules and build output to speed up dev container and reduce network needs
  go_mod_cache: {}
  go_build_cache: {}

services:
  mongo1:
    container_name: mongo1
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    networks:
      - backend
      - frontend
    ports:
      - "30001:30001"
    command: ["sh", "-c", "until [ -f /data/config/replica.key ]; do echo 'Waiting for replica.key...'; sleep 2; done; exec /usr/local/bin/docker-entrypoint.sh mongod --replSet dbrs --keyFile /data/config/replica.key --bind_ip_all --port 30001"]
    volumes:
      - mongo1_data:/data/db
      - mongo_config:/data/config
    healthcheck:
      test: ["CMD", "mongosh", "--port", "30001", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo2:
    container_name: mongo2
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    networks:
      - backend
      - frontend
    ports:
      - "30002:30002"
    command: ["sh", "-c", "until [ -f /data/config/replica.key ]; do echo 'Waiting for replica.key...'; sleep 2; done; exec /usr/local/bin/docker-entrypoint.sh mongod --replSet dbrs --keyFile /data/config/replica.key --bind_ip_all --port 30002"]
    volumes:
      - mongo2_data:/data/db
      - mongo_config:/data/config
    healthcheck:
      test: ["CMD", "mongosh", "--port", "30002", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo3:
    container_name: mongo3
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dockTest
      - MONGO_REPLICA_SET_NAME=dbrs
    ports:
      - "30003:30003"
    networks:
      - backend
      - frontend
    command: ["sh", "-c", "until [ -f /data/config/replica.key ]; do echo 'Waiting for replica.key...'; sleep 2; done; exec /usr/local/bin/docker-entrypoint.sh mongod --replSet dbrs --keyFile /data/config/replica.key --bind_ip_all --port 30003"]
    volumes:
      - mongo3_data:/data/db
      - mongo_config:/data/config
    healthcheck:
      test: ["CMD", "mongosh", "--port", "30003", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo-init:
    image: mongo:latest
    container_name: mongo-init
    depends_on:
      mongo1:
        condition: service_started
      mongo2:
        condition: service_started
      mongo3:
        condition: service_started
    volumes:
      - "./config/mongo:/scripts"
      - mongo_config:/data/config
    restart: "no"
    networks:
      - backend
    entrypoint:
      - "bash"
      - "-c"
      - |
        if [ ! -f /data/config/replica.key ]; then
          echo "Generating replica.key..."
          openssl rand -base64 756 > /data/config/replica.key
          chmod 400 /data/config/replica.key
          chown 999:999 /data/config/replica.key
        fi
        exec bash /scripts/mongo_init.sh

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - backend
      - frontend
    volumes:
      - "./config/monitor/prometheus:/etc/prometheus"
      - "./config/certs:/etc/prometheus/certs:ro"
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.config.file=/etc/prometheus/web-config.yml'
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    networks:
      - frontend
      - backend
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    volumes:
      - "./config/monitor/loki:/etc/loki"
      - "./config/certs:/etc/loki/certs:ro"
      - loki_data:/loki
    restart: unless-stopped
    # No container-level healthcheck: the grafana/loki image is distroless
    # (no /bin/sh or wget). Alloy retries pushes on transient Loki errors,
    # so a service_started dependency is sufficient.

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    # Run as root so the in-container alloy user can read /var/run/docker.sock.
    # Production deployments should use a service account / DaemonSet pattern instead;
    # see docs/observability.md.
    user: root
    networks:
      - frontend
      - backend
    ports:
      - "3200:3200"
    # Alloy's HTTP UI is clustered with the other observability ports:
    # 3000 Grafana, 3100 Loki, 3200 Alloy. Port 12345 (Alloy's default) is
    # intentionally avoided because internal/server/test/poll_*_test.go
    # uses localhost:12345 as a "should be unreachable" endpoint.
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:3200"
      - "/etc/alloy/config.alloy"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./config/monitor/alloy:/etc/alloy"
      - "./config/certs:/etc/alloy/certs:ro"
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    networks:
      - frontend
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - keycloak
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_ROOT_URL=https://localhost:3000
      - GF_SERVER_CERT_FILE=/etc/grafana/certs/server-cert.pem
      - GF_SERVER_CERT_KEY=/etc/grafana/certs/server-key.pem
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=GoSignals Realm
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=grafana-client-secret
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid email profile roles
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://keycloak:9080/realms/gosignals/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://keycloak:9080/realms/gosignals/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://keycloak:9080/realms/gosignals/protocol/openid-connect/userinfo
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=email
      - "GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(resource_access.grafana.roles[*], 'admin') && 'Admin' || contains(resource_access.grafana.roles[*], 'editor') && 'Editor' || 'Viewer'"
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT=false
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_TLS_CLIENT_CA=/etc/grafana/certs/ca-cert.pem
    volumes:
      - "./config/monitor/grafana:/etc/grafana/provisioning/datasources"
      - "./config/monitor/grafana-dashboards:/etc/grafana/provisioning/dashboards"
      - "./config/certs:/etc/grafana/certs:ro"

  goSignals1:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    container_name: gosignals1
    hostname: goSignals1
    networks:
      - frontend
      - backend
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    ports:
      - "8888:8888"
      - "2345:2345"
    # Optional DNS override can help if Docker Desktop DNS is flaky on your network/VPN
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - ./config/goSignals1.env
    environment:
      - LOG_FORMAT=json
      - I2SIG_CLUSTER_NAME=dev-local
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -skf https://localhost:8888/health || curl -sf http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  goSignals2:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    container_name: gosignals2
    hostname: goSignals2
    networks:
      - frontend
      - backend
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    ports:
      - "8889:8889"
      - "2346:2345"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - ./config/goSignals2.env
    environment:
      - LOG_FORMAT=json
      - I2SIG_CLUSTER_NAME=dev-local
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -skf https://localhost:8889/health || curl -sf http://localhost:8889/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  goSsfServer:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    container_name: gossfserver
    hostname: goSsfServer
    networks:
      - frontend
      - backend
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    ports:
      - "8890:8890"
      - "2347:2345"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - ./config/goSsf1.env
    environment:
      - LOG_FORMAT=json
      - I2SIG_CLUSTER_NAME=dev-local
    command: ["dlv", "debug", "./cmd/goSsfServer", "--headless=true", "--listen=:2345", "--api-version=2", "--accept-multiclient", "--continue"]

  scimSsfSetup:
    build:
      context: .
      dockerfile: Dockerfile-dev
    image: i2gosignals-dev:latest
    container_name: scim-ssf-setup
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      goSignals1:
        condition: service_healthy
      goSignals2:
        condition: service_healthy
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - "./config/scim:/scim"
      - "./config/certs:/scim/certs"
    restart: "no"
    networks:
      - backend
      - frontend
    environment:
      - ISSUER=cluster.scim.example.com
      - GOSIGNALS_HOME=/scim/config.json
      - I2SIG_TLS_CA_CERT=/scim/certs/ca-cert.pem
   #   - GOSIGNALS_SCRIPT=/scim/auto-reg.gosignals
    entrypoint: [ "sh", "/scim/scripts/register-dev.sh"]

  scim_cluster1:
    image: independentid/i2scim-universal:latest
    container_name: scim_cluster1
    networks:
      - frontend
    ports:
      - "9000:8080"
    depends_on:
      goSignals1:
        condition: service_started
      scimSsfSetup:
        condition: service_completed_successfully
    volumes:
      - ./config/scim/data1:/scim
      - "./config/certs:/scim-certs:ro"
    env_file:
      - ./config/scim/scripts/scim-server.env
    environment:
      - QUARKUS_LOG_CONSOLE_JSON=true
      - NODE_ID=scim_cluster1
      - CLUSTER_NAME=dev-local
      # Serve an HTTPS listener (Quarkus default :8443) alongside the plain
      # :8080 SCIM API, using the shared dev certificate, so Prometheus can
      # scrape /q/metrics over TLS.
      - QUARKUS_HTTP_SSL_CERTIFICATE_FILES=/scim-certs/server-cert.pem
      - QUARKUS_HTTP_SSL_CERTIFICATE_KEY_FILES=/scim-certs/server-key.pem
  scim_cluster2:
    image: independentid/i2scim-universal:latest
    container_name: scim_cluster2
    networks:
      - frontend
    ports:
      - "9001:8080"
    depends_on:
      goSignals1:
        condition: service_started
      scimSsfSetup:
        condition: service_completed_successfully
    volumes:
      - ./config/scim/data2:/scim
      - "./config/certs:/scim-certs:ro"
    env_file:
      - ./config/scim/scripts/scim-server.env
    environment:
      - QUARKUS_LOG_CONSOLE_JSON=true
      - NODE_ID=scim_cluster2
      - CLUSTER_NAME=dev-local
      # Serve an HTTPS listener (Quarkus default :8443) alongside the plain
      # :8080 SCIM API, using the shared dev certificate, so Prometheus can
      # scrape /q/metrics over TLS.
      - QUARKUS_HTTP_SSL_CERTIFICATE_FILES=/scim-certs/server-cert.pem
      - QUARKUS_HTTP_SSL_CERTIFICATE_KEY_FILES=/scim-certs/server-key.pem
  postgres:
    image: postgres:alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak-signals
    hostname: keycloak
    networks:
      - frontend
      - backend
    command: start-dev --import-realm
    # --spi-theme-static-max-age=-1 --spi-theme-cache-themes=false --spi-theme-cache-templates=false --log-level=org.keycloak.theme:DEBUG
    environment:
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_URL: https://keycloak:9080
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/server-cert.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/server-key.pem
      KC_HTTPS_PORT: 9080
      KC_FEATURES: scripts
      KC_SCRIPT_UPLOAD_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      QUARKUS_HTTP_HOST: 0.0.0.0
    ports:
      - 9080:9080
    depends_on:
      - postgres
    volumes:
      - "./config/keycloak/realm:/opt/keycloak/data/import"
      - "./config/keycloak/themes/gosignals-mui:/opt/keycloak/themes/gosignals-mui"
      - "./config/certs:/opt/keycloak/certs"

networks:
  frontend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
  backend:
    driver: bridge